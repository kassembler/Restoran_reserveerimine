<!DOCTYPE html>
<html>
<head>

<title>Restaurant</title>

<style>

#grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:20px;
margin-top:20px;
}

.table{
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.free{ background:lightgreen; }
.reserved{ background:red; }
.recommended{ background:gold; }

</style>

</head>

<body>

<h2>Table reservation prototype</h2>

People:
<input id="people" type="number" value="2">

<label>
<input type="checkbox" id="window">
Window
</label>

<label>
<input type="checkbox" id="quiet">
Quiet
</label>

<button onclick="load()">Search</button>

<div id="grid"></div>

<script>

function load(){

let people = document.getElementById("people").value
let windowPref = document.getElementById("window").checked
let quiet = document.getElementById("quiet").checked

fetch(`/api/tables?people=${people}&window=${windowPref}&quiet=${quiet}`)
.then(r=>r.json())
.then(data=>{

let grid=document.getElementById("grid")
grid.innerHTML=""

data.forEach(t=>{

let d=document.createElement("div")
d.classList.add("table")

if(t.reserved)
d.classList.add("reserved")
else
d.classList.add("free")

if(t.recommended && !t.reserved)
d.classList.add("recommended")

d.innerText = t.id

grid.appendChild(d)

})

})

}

load()

</script>

</body>
</html>
